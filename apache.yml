---
- hosts: web
  become: yes

  tasks:

    - name: Install Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create custom webpage
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Deployed by Ansible , Developed by vikram vk, go ahead with scripting</h1>
          <h2>Vikram's Terraform + Jenkins + Ansible Project</h2>
